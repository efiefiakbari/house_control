<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل کنترل سخت‌افزار</title>
    <style>
        body { font-family: Tahoma, sans-serif; background-color: #1e1e2f; color: #fff; padding: 20px; text-align: center; direction: rtl; }
        .container { max-width: 500px; margin: 0 auto; background: #27293d; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        h1 { color: #00f2c4; font-size: 24px; }
        .card { background: #1d1e2e; padding: 15px; margin: 15px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #344675; }
        .btn { padding: 10px 25px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; min-width: 100px; transition: 0.2s; }
        .btn-on { background: #00f2c4; color: #1d1e2e; }
        .btn-off { background: #fd5d93; }
        .status { margin-top: 5px; color: #8c8cbe; font-size: 13px; }
        .login-box { margin-bottom: 20px; padding: 15px; background: #1d1e2e; border-radius: 10px; border: 1px solid #344675; text-align: right; }
        input { width: 95%; padding: 10px; margin: 8px 0; background: #27293d; border: 1px solid #344675; border-radius: 6px; font-size: 14px; color: #fff; text-align: center; }
        label { font-size: 14px; color: #00f2c4; display: block; text-align: center; }
        .action-btn { background: #1f8ef1; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ پنل کنترل متمرکز سخت‌افزار</h1>
    
    <div id="login-section" class="login-box">
        <label>🔑 رمز عبور ورود به سیستم را وارد کنید:</label>
        <input type="password" id="panel-pass" placeholder="****">
        <button class="action-btn" onclick="checkLogin()">ورود به پنل</button>
    </div>

    <div id="panel-content" style="display:none;">
        <div style="text-align: left; margin-bottom: 10px;">
            <button onclick="location.reload()" style="background:none; border:none; color:#fd5d93; cursor:pointer; font-size:12px;">🔒 خروج و قفل مجدد</button>
        </div>
        <div class="card">
            <div>
                <strong>💡 چراغ روی برد (Built-in LED)</strong>
                <div class="status" id="led-status">وضعیت: نامشخص</div>
            </div>
            <button id="led-btn" class="btn btn-off" onclick="toggleLED()">خاموش</button>
        </div>
        <div id="gpio-container"></div>
    </div>
</div>

<script>
    // تقسیم توکن جهت امنیت و جلوگیری از حذف خودکار توسط گیت‌هاب
    const p1 = "ghp_J7jXA90TBzcdN49L";
    const p2 = "cldo3WiAdqkzD02BIbKT";
    const GIST_ID = "270608931a86e0d13e24cff5419393b8"; 
    
    let currentData = null;

    function checkLogin() {
        const password = document.getElementById('panel-pass').value.trim();
        
        if (password === "1234") {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('panel-content').style.display = 'block';
            
            loadGistData();
            setInterval(loadGistData, 4000); 
        } else {
            alert('رمز عبور اشتباه است! ❌');
        }
    }

    function getHeaders() {
        return {
            "Authorization": `token ${p1}${p2}`,
            "Content-Type": "application/json"
        };
    }

    async function loadGistData() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}?t=${Date.now()}`, { headers: getHeaders() });
            const data = await res.json();
            currentData = JSON.parse(data.files["status.json"].content);
            renderPanel();
        } catch (err) {
            console.error("خطا در دریافت وضعیت:", err);
        }
    }

    function renderPanel() {
        const ledBtn = document.getElementById('led-btn');
        const ledStatus = document.getElementById('led-status');
        if (currentData.led) {
            ledBtn.className = "btn btn-on"; ledBtn.innerText = "روشن"; ledStatus.innerText = "وضعیت: روشن";
        } else {
            ledBtn.className = "btn btn-off"; ledBtn.innerText = "خاموش"; ledStatus.innerText = "وضعیت: خاموش";
        }

        const container = document.getElementById('gpio-container');
        container.innerHTML = '';
        currentData.gpio.forEach(g => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div>
                    <strong>🔌 پین شماره GPIO ${g.pin}</strong>
                    <div class="status">وضعیت: ${g.state ? 'روشن 🟢' : 'خاموش ⚫'}</div>
                </div>
                <button class="btn ${g.state ? 'btn-on' : 'btn-off'}" onclick="toggleGPIO(${g.pin})">
                    ${g.state ? 'روشن' : 'خاموش'}
                </button>
            `;
            container.appendChild(card);
        });
    }

    async function updateGist() {
        const updatePayload = {
            "files": { "status.json": { "content": JSON.stringify(currentData) } }
        };
        try {
            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: "PATCH",
                headers: getHeaders(),
                body: JSON.stringify(updatePayload)
            });
            renderPanel();
        } catch (err) {
            console.error("خطا در ارسال دستور");
        }
    }

    function toggleLED() { currentData.led = !currentData.led; updateGist(); }
    function toggleGPIO(pinIdx) {
        const target = currentData.gpio.find(g => g.pin === pinIdx);
        if (target) { target.state = !target.state; updateGist(); }
    }
</script>
</body>
</html>
